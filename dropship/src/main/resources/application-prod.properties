# Configuração de Base de Dados
spring.datasource.url=jdbc:mysql://localhost:3306/center_db?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.username=appuser
spring.datasource.password=app123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

# JPA/Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.charSet=UTF-8

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Jackson
spring.jackson.default-property-inclusion=non_null

# Debug Options
#debug=false
#spring.mvc.log-request-details=true
#logging.level.org.springframework=debug
#logging.level.org.springframework.security=trace