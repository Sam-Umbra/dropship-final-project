# Configuração de Base de Dados
spring.datasource.url=jdbc:mysql://mysql:3306/center_db?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.username=appuser
spring.datasource.password=app123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initialization-fail-timeout=60000  
# 60 segundos

# JPA/Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.jdbc.charSet=UTF-8
spring.jpa.properties.hibernate.type=trace


# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Jackson
spring.jackson.default-property-inclusion=non_null

# Debug Options
#debug=false
#spring.mvc.log-request-details=true
#logging.level.org.springframework=debug
#logging.level.org.springframework.security=trace

#Email
spring.mail.host=${MAIL_HOST_SERVER}
spring.mail.port=${MAIL_HOST_PORT}
spring.mail.username=${MAIL_HOST_USER}
spring.mail.password=${MAIL_HOST_PASSWORD}
spring.mail.protocol=${MAIL_HOST_PROTOCOL}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000